<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP CSA Jeopardy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --royal: #1a3a6b;
    --blue: #1e4fa0;
    --mid: #2563c8;
    --bright: #3b82f6;
    --sky: #60a5fa;
    --pale: #bfdbfe;
    --white: #f0f6ff;
    --gold: #fbbf24;
    --gold-dark: #d97706;
    --silver: #94a3b8;
    --correct: #22c55e;
    --wrong: #ef4444;
    --glow: 0 0 20px rgba(59,130,246,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(30,79,160,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(26,58,107,0.4) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 18px 20px 10px;
    position: relative;
    border-bottom: 2px solid var(--mid);
    background: linear-gradient(180deg, rgba(26,58,107,0.8) 0%, transparent 100%);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.8rem);
    letter-spacing: 0.08em;
    color: var(--white);
    text-shadow: 0 0 30px rgba(59,130,246,0.7), 0 2px 0 var(--navy);
    line-height: 1;
  }

  header h1 span { color: var(--gold); }

  header p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    color: var(--sky);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* SCORES */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 12px 20px;
    background: rgba(10,22,40,0.6);
    border-bottom: 1px solid rgba(59,130,246,0.2);
    flex-wrap: wrap;
  }

  .team-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(135deg, rgba(30,79,160,0.4), rgba(10,22,40,0.6));
    border: 1px solid var(--mid);
    border-radius: 10px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 140px;
  }

  .team-score.active {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(30,79,160,0.4));
    box-shadow: 0 0 18px rgba(251,191,36,0.3);
  }

  .team-score:hover { transform: translateY(-2px); }

  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sky);
    margin-bottom: 2px;
  }

  .team-score.active .team-name { color: var(--gold); }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--white);
    line-height: 1;
  }

  .team-score.active .score-value { color: var(--gold); }

  .active-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 2px;
    font-weight: 600;
  }

  /* BOARD */
  .board-wrap {
    padding: 14px 16px;
    display: flex;
    justify-content: center;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 1200px;
  }

  /* Category headers */
  .cat-header {
    background: linear-gradient(180deg, var(--royal) 0%, var(--blue) 100%);
    border: 1px solid var(--mid);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(0.6rem, 1.2vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1.2;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Question cells */
  .cell {
    background: linear-gradient(180deg, var(--blue) 0%, var(--royal) 100%);
    border: 1px solid var(--mid);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    min-height: 70px;
    position: relative;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .cell:hover:not(.used) {
    transform: scale(1.04);
    border-color: var(--bright);
    box-shadow: var(--glow), 0 4px 20px rgba(0,0,0,0.4);
    z-index: 2;
  }

  .cell .points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    color: var(--gold);
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.02em;
  }

  .cell.used {
    background: rgba(10,22,40,0.5);
    border-color: rgba(30,79,160,0.2);
    cursor: default;
  }

  .cell.used .points { opacity: 0; }

  /* MODAL */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,20,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: linear-gradient(145deg, var(--royal) 0%, var(--navy) 100%);
    border: 2px solid var(--mid);
    border-radius: 16px;
    padding: 36px 40px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 0 60px rgba(59,130,246,0.25), 0 30px 80px rgba(0,0,0,0.7);
    position: relative;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-category {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sky);
    margin-bottom: 6px;
  }

  .modal-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(251,191,36,0.4);
  }

  .modal-question {
    font-size: 1.15rem;
    line-height: 1.6;
    color: var(--white);
    margin-bottom: 28px;
    border-left: 3px solid var(--bright);
    padding-left: 16px;
  }

  /* Code blocks in questions */
  .modal-question code {
    background: rgba(10,22,40,0.7);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Courier New', monospace;
    font-size: 0.9em;
    color: var(--sky);
  }

  .modal-question pre {
    background: rgba(10,22,40,0.7);
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 8px;
    padding: 14px 16px;
    margin: 12px 0;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--sky);
    overflow-x: auto;
    line-height: 1.5;
  }

  .reveal-btn {
    background: none;
    border: 1px solid var(--mid);
    color: var(--sky);
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-bottom: 16px;
  }

  .reveal-btn:hover { background: rgba(59,130,246,0.15); border-color: var(--bright); }

  .modal-answer {
    display: none;
    background: rgba(10,22,40,0.6);
    border: 1px solid var(--bright);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    color: var(--pale);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .modal-answer.show { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .modal-answer strong { color: var(--white); }
  .modal-answer code {
    background: rgba(10,22,40,0.7);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Courier New', monospace;
    font-size: 0.88em;
    color: var(--gold);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 11px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-correct {
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
  }
  .btn-correct:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(34,197,94,0.4); }

  .btn-wrong {
    background: linear-gradient(135deg, #b91c1c, #ef4444);
    color: white;
  }
  .btn-wrong:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(239,68,68,0.4); }

  .btn-skip {
    background: transparent;
    border: 1px solid var(--silver);
    color: var(--silver);
  }
  .btn-skip:hover { background: rgba(148,163,184,0.1); }

  .team-picker {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sky);
    margin-bottom: 10px;
  }

  .team-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .team-btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--mid);
    background: transparent;
    color: var(--pale);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .team-btn.selected {
    background: var(--mid);
    border-color: var(--bright);
    color: var(--white);
  }

  .close-modal {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: none;
    color: var(--silver);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }

  .close-modal:hover { color: var(--white); }

  /* WINNER MODAL */
  .winner-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,20,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
  }

  .winner-overlay.show { display: flex; }

  .winner-modal {
    background: linear-gradient(145deg, var(--royal), var(--navy));
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 0 80px rgba(251,191,36,0.3), 0 40px 100px rgba(0,0,0,0.8);
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .trophy { font-size: 4rem; margin-bottom: 16px; }

  .winner-modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(251,191,36,0.5);
    margin-bottom: 8px;
  }

  .winner-modal p {
    color: var(--sky);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .reset-btn {
    background: linear-gradient(135deg, var(--mid), var(--bright));
    border: none;
    color: white;
    padding: 14px 36px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    transition: all 0.2s;
  }

  .reset-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }

  /* Responsive */
  @media (max-width: 700px) {
    .board { gap: 4px; }
    .cat-header { font-size: 0.55rem; min-height: 46px; padding: 6px 4px; }
    .cell { min-height: 52px; }
    .cell .points { font-size: 1.1rem; }
    .modal { padding: 24px 20px; }
    .modal-points { font-size: 2rem; }
    .modal-question { font-size: 1rem; }
    .winner-modal { padding: 30px 24px; }
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setupScreen" style="
  position:fixed;inset:0;background:var(--navy);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(30,79,160,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(26,58,107,0.4) 0%,transparent 50%);
">
  <div style="
    background:linear-gradient(145deg,var(--royal),var(--navy));
    border:2px solid var(--mid);border-radius:20px;
    padding:44px 48px;max-width:480px;width:100%;
    box-shadow:0 0 60px rgba(59,130,246,0.2),0 30px 80px rgba(0,0,0,0.7);
    text-align:center;
  ">
    <div style="font-size:2.8rem;margin-bottom:8px;">🎓</div>
    <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:0.08em;color:var(--white);text-shadow:0 0 20px rgba(59,130,246,0.5);">AP <span style="color:var(--gold);">CSA</span> Jeopardy</h1>
    <p style="font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:0.2em;color:var(--sky);text-transform:uppercase;margin-bottom:32px;">Enter team names to begin</p>

    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:32px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);min-width:28px;">1</span>
        <input id="tname0" type="text" placeholder="Team 1 name" maxlength="20" style="
          flex:1;background:rgba(10,22,40,0.7);border:1px solid var(--mid);
          border-radius:8px;padding:11px 16px;color:var(--white);
          font-family:'Barlow Condensed',sans-serif;font-size:1rem;
          letter-spacing:0.05em;outline:none;transition:border-color 0.2s;
        ">
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);min-width:28px;">2</span>
        <input id="tname1" type="text" placeholder="Team 2 name" maxlength="20" style="
          flex:1;background:rgba(10,22,40,0.7);border:1px solid var(--mid);
          border-radius:8px;padding:11px 16px;color:var(--white);
          font-family:'Barlow Condensed',sans-serif;font-size:1rem;
          letter-spacing:0.05em;outline:none;transition:border-color 0.2s;
        ">
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);min-width:28px;">3</span>
        <input id="tname2" type="text" placeholder="Team 3 name" maxlength="20" style="
          flex:1;background:rgba(10,22,40,0.7);border:1px solid var(--mid);
          border-radius:8px;padding:11px 16px;color:var(--white);
          font-family:'Barlow Condensed',sans-serif;font-size:1rem;
          letter-spacing:0.05em;outline:none;transition:border-color 0.2s;
        ">
      </div>
    </div>

    <button onclick="startGame()" style="
      background:linear-gradient(135deg,var(--mid),var(--bright));
      border:none;color:white;padding:14px 48px;border-radius:10px;
      cursor:pointer;font-family:'Barlow Condensed',sans-serif;
      font-size:1.15rem;letter-spacing:0.12em;text-transform:uppercase;
      font-weight:700;transition:all 0.2s;width:100%;
    " onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">
      Start Game →
    </button>
  </div>
</div>

<header>
  <h1>AP <span>CSA</span> Jeopardy</h1>
  <p>Advanced Placement Computer Science A</p>
</header>

<div class="scoreboard" id="scoreboard"></div>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- Question Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close-modal" id="closeModal">✕</button>
    <div class="modal-category" id="modalCat"></div>
    <div class="modal-points" id="modalPts"></div>
    <div class="modal-question" id="modalQ"></div>
    <button class="reveal-btn" id="revealBtn">Reveal Answer</button>
    <div class="modal-answer" id="modalA"></div>
    <div class="team-picker">Award points to:</div>
    <div class="team-btns" id="teamBtns"></div>
    <div class="modal-actions">
      <button class="btn btn-correct" id="btnCorrect">✓ Correct</button>
      <button class="btn btn-wrong" id="btnWrong">✗ Wrong (–pts)</button>
      <button class="btn btn-skip" id="btnSkip">Skip</button>
    </div>
  </div>
</div>

<!-- Winner Modal -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-modal">
    <div class="trophy">🏆</div>
    <h2 id="winnerName">Team 1</h2>
    <p id="winnerScore">wins with 0 points!</p>
    <button class="reset-btn" onclick="resetGame()">Play Again</button>
  </div>
</div>

<script>
let TEAMS = ['Team 1', 'Team 2', 'Team 3'];

const CATEGORIES = [
  'Sorting & Searching',
  '2D Arrays & ArrayLists',
  'Methods & Control Structures',
  'Loops',
  'Recursion',
  'String & Math Classes'
];

// 6 categories × 6 point values (100–600)
const QUESTIONS = [

  // === SORTING & SEARCHING ===
  [
    {
      q: `In binary search, what must be updated when the target is <b>greater than</b> the middle element?`,
      a: `Increase <code>low</code> to <code>mid + 1</code>. Since the target is larger, we discard the left half and search only the right half.`
    },
    {
      q: `Given this array and using <b>Selection Sort</b> (ascending), what does the array look like after the <b>second pass</b>?<pre>int[] nums = {77, 53, 28, 30, 19, 65};</pre>`,
      a: `<strong>[19, 28, 53, 30, 77, 65]</strong><br>Pass 1: Find min (19) → swap with index 0 → [19, 53, 28, 30, 77, 65]<br>Pass 2: Find min of remaining (28) → swap with index 1 → [19, 28, 53, 30, 77, 65]`
    },
    {
      q: `What condition causes a <b>binary search</b> to stop when the target is <b>NOT found</b>?`,
      a: `The search stops when <code>low</code> becomes <strong>greater than</strong> <code>high</code>. At that point the search space is empty and the target does not exist in the array.`
    },
    {
      q: `Given this array and using <b>Insertion Sort</b> (ascending), what does it look like after the <b>third pass</b>?<pre>String[] letters = {"p", "b", "D", "E", "y", "S"};</pre>`,
      a: `<strong>["D", "E", "b", "p", "y", "S"]</strong><br>Note: In Java String comparison, uppercase letters come before lowercase.<br>Pass 1: insert "b" → ["b","p","D","E","y","S"]<br>Pass 2: insert "D" → ["D","b","p","E","y","S"]<br>Pass 3: insert "E" → ["D","E","b","p","y","S"]`
    },
    {
      q: `After <b>3 passes of Selection Sort</b>, what is the array?<pre>int[] arr = {5, 2, 9, 1, 6};
for (int i = 0; i &lt; 3; i++) {
  int minIndex = i;
  for (int j = i+1; j &lt; arr.length; j++)
    if (arr[j] &lt; arr[minIndex]) minIndex = j;
  int temp = arr[i];
  arr[i] = arr[minIndex];
  arr[minIndex] = temp;
}</pre>`,
      a: `<strong>[1, 2, 5, 9, 6]</strong><br>Pass 1: min=1 → swap with index 0 → [1,2,9,5,6] wait — min of {5,2,9,1,6}=1 at idx 3 → [1,2,9,5,6]... re-trace:<br>Pass 1: min=1(idx3)→swap→[1,2,9,5,6]<br>Pass 2: min of {2,9,5,6}=2(idx1)→no swap→[1,2,9,5,6]<br>Pass 3: min of {9,5,6}=5(idx3)→swap→[1,2,5,9,6]`
    },
    {
      q: `What are <code>low</code>, <code>high</code>, and <code>mid</code> after <b>2 iterations</b> of this binary search?<pre>int[] arr = {1,3,5,7,9,11,13};
int target = 7;
int low = 0, high = arr.length - 1;
for (int i = 0; i &lt; 2; i++) {
  int mid = (low + high) / 2;
  if (arr[mid] == target) break;
  else if (arr[mid] &lt; target) low = mid + 1;
  else high = mid - 1;
  System.out.println(low+" "+high+" "+mid);
}</pre>`,
      a: `<strong>Iteration 1:</strong> low=0, high=6 → mid=3 → arr[3]=7 == target → break!<br>Wait — target IS found at iteration 1, so the loop breaks immediately.<br>Printed: nothing (break before println).<br>If target were not found at mid=3: Iteration 1 output: <strong>low=4, high=6, mid=3</strong>; Iteration 2: mid=5 → output: <strong>low=4, high=4, mid=5</strong>`
    }
  ],

  // === 2D ARRAYS & ARRAYLISTS ===
  [
    {
      q: `What is the output of the following code?<pre>int[][] grid = { {9,2}, {15,3}, {6,22} };
int sum = 0;
for (int r = 0; r &lt; grid.length; r++)
  for (int c = 0; c &lt; grid[0].length; c++)
    if (grid[r][c] % 2 == 0) sum += grid[r][c];
System.out.println(sum);</pre>`,
      a: `Adds only even numbers: 2 + 6 + 22 = <strong>30</strong><br>9 (odd, skip), 2 ✓, 15 (odd, skip), 3 (odd, skip), 6 ✓, 22 ✓`
    },
    {
      q: `What is printed?<pre>int[][] grid = {{2,4,6},{1,3,5},{7,8,9}};
int count = 0;
for (int r = 0; r &lt; grid.length; r++)
  for (int c = 0; c &lt; grid[0].length; c++)
    if (r == c) count += grid[r][c];
System.out.println(count);</pre>`,
      a: `Only sums diagonal elements where <code>r == c</code>:<br>grid[0][0]=2, grid[1][1]=3, grid[2][2]=9 → 2+3+9 = <strong>14</strong>`
    },
    {
      q: `What is printed?<pre>ArrayList&lt;Integer&gt; list =
  new ArrayList&lt;&gt;(Arrays.asList(1,2,3,4,5));
for (int i = 0; i &lt; list.size(); i++) {
  if (list.get(i) % 2 == 1)
    list.set(i, list.get(i) * 2);
}
System.out.println(list);</pre>`,
      a: `Odd numbers (1, 3, 5) get doubled; even numbers stay the same.<br>1→2, 2 stays, 3→6, 4 stays, 5→10<br>Result: <strong>[2, 2, 6, 4, 10]</strong>`
    },
    {
      q: `What is the output?<pre>ArrayList&lt;Integer&gt; numList = new ArrayList&lt;&gt;();
numList.add(3);   // [3]
numList.add(2);   // [3,2]
numList.add(1);   // [3,2,1]
numList.add(1, 0); // insert 0 at idx 1
numList.set(0, 2); // replace idx 0 with 2
numList.remove(2); // remove element at idx 2
numList.add(1, 5); // insert 5 at idx 1
numList.set(numList.size()-1, 4);
System.out.print(numList);</pre>`,
      a: `Step by step:<br>[3] → [3,2] → [3,2,1] → [3,0,2,1] → [2,0,2,1] → [2,0,1] → [2,5,0,1] → [2,5,0,<strong>4</strong>]<br>Answer: <strong>[2, 5, 0, 4]</strong>`
    },
    {
      q: `This code is meant to remove all even values from the ArrayList, but it doesn't work as intended. Why?<pre>ArrayList&lt;Integer&gt; numbers =
  new ArrayList&lt;&gt;(Arrays.asList(2,4,6,7,8,9,10));
for (int i = 0; i &lt; numbers.size(); i++) {
  if (numbers.get(i) % 2 == 0)
    numbers.remove(i);
}
System.out.println("Result: " + numbers);</pre>`,
      a: `<strong>Problem:</strong> When an element is removed, all subsequent elements shift left by one index. The loop then increments <code>i</code>, causing it to <strong>skip the element that shifted into the removed element's position</strong>.<br>Fix: iterate backwards (<code>i--</code> after removing), or use an Iterator.`
    },
    {
      q: `What is the result of executing this code?<pre>ArrayList&lt;Integer&gt; nums =
  new ArrayList&lt;&gt;(Arrays.asList(2,4,6,8,10));
for (int i = 0; i &lt; nums.size(); i++) {
  if (nums.get(i) % 4 == 0) {
    nums.remove(i);
  } else {
    nums.set(i, nums.get(i) + nums.get(i-1));
  }
}
System.out.println(nums);</pre>`,
      a: `<strong>Runtime error: IndexOutOfBoundsException</strong><br>When i=0 and nums.get(0)=2 (not divisible by 4), the else branch tries <code>nums.get(i-1)</code> = <code>nums.get(-1)</code>, which throws an IndexOutOfBoundsException.`
    }
  ],

  // === METHODS & CONTROL STRUCTURES ===
  [
    {
      q: `Consider the <code>Shoe</code> class. Which best describes the error?<pre>public class Shoe {
  int shoe_type;
  String brandName;
  int price;
  int color;
  //other methods not included
}</pre>`,
      a: `<strong>The attributes <code>shoe_type</code> and <code>color</code> must be declared as type <code>String</code>, and <code>price</code> must be declared as <code>double</code>.</strong><br>Shoe type and color are descriptive labels (not numbers), and price should support decimal values.`
    },
    {
      q: `Consider the <code>StringThing</code> class. What is printed when <code>main</code> runs?<pre>String str = "hamburger";
String result = method1(str); // removes vowels
System.out.println(str + " " + result);</pre>(method1 removes all vowels from the string)`,
      a: `<strong>hamburger hmbrgr</strong><br>method1 builds a new string keeping only consonants (characters not in "aeiou"). The original <code>str</code> is unchanged (Strings are immutable). Result has all vowels removed: h-m-b-r-g-r.`
    },
    {
      q: `What is the output of the following code?<pre>Dog myDog = new Dog("Molly");
System.out.println(myDog.bark());</pre>Given: <code>bark()</code> returns <code>name + " says woof!"</code>`,
      a: `<strong>Molly says woof!</strong><br>The Dog constructor sets <code>name = "Molly"</code>. Calling <code>bark()</code> returns <code>"Molly" + " says woof!"</code> which is then printed.`
    },
    {
      q: `Write a constructor for the <code>GolfBag</code> class that initializes all instance variables. <code>color</code> = <code>false</code> if <code>col</code> is "BLACK" or "WHITE", <code>true</code> otherwise.`,
      a: `<pre>public GolfBag(String name, Equipment equip, String col) {
  golferName = name;
  equipment = equip;
  if (col.equals("BLACK") || col.equals("WHITE"))
    color = false;
  else
    color = true;
}</pre>`
    },
    {
      q: `Consider this code. What is the result when compiled and run, and what fix is needed?<pre>public class Toy {
  private String name;
  public void setName(String newName) { name = newName; }
  public void printName() {
    System.out.println("Name: " + newName); // bug
  }
}</pre>`,
      a: `<strong>The code will NOT compile</strong> because <code>newName</code> is undefined inside <code>printName()</code>. It is a parameter of <code>setName()</code>, not accessible in <code>printName()</code>.<br>Fix: change <code>newName</code> to <code>name</code> in the println.`
    },
    {
      q: `Which statements are true for this code segment?<pre>public class Sport {
  public void playGames() { /*code*/ }
  public static void main(String[] args) {
    Sport game = null;
    game.playGames();
    System.out.println("I played games");
  }
}</pre>I. Prints "I played games" &nbsp; II. Throws NullPointerException &nbsp; III. Runs without error &nbsp; IV. Null reference calling playGames() causes error &nbsp; V. game can't point to null`,
      a: `<strong>II and IV</strong><br><code>game</code> is <code>null</code>, so calling <code>game.playGames()</code> throws a <code>NullPointerException</code> at runtime. The null reference itself is valid Java syntax (V is false), but invoking a method on null causes an error (IV is true). The print statement is never reached (I is false).`
    }
  ],

  // === LOOPS ===
  [
    {
      q: `What does the following code segment output?<pre>int x = 5 + 7 % 2;
if (x &gt;= 6) { x = x + 3; }
x = x + 2;
System.out.println(x);</pre>`,
      a: `<strong>11</strong><br><code>7 % 2 = 1</code>, so <code>x = 5 + 1 = 6</code>.<br>Since 6 &gt;= 6 is true: <code>x = 6 + 3 = 9</code>.<br>Then <code>x = 9 + 2 = 11</code>.`
    },
    {
      q: `What does the following code output?<pre>String item = "dessert";
int numberchoice = 2;
if (item.equals("dessert"))
  System.out.println("Making a traditional dessert.");
numberchoice = numberchoice + (item.length() % 6);
if (numberchoice == 2)
  System.out.println("Add chocolate chips.");
System.out.println("Cooking for 30 minutes.");</pre>`,
      a: `<strong>Making a traditional dessert.</strong><br><strong>Cooking for 30 Minutes.</strong><br><code>item.length()=7</code>, <code>7%6=1</code>, so <code>numberchoice=2+1=3</code>. Since 3≠2, "Add chocolate chips." is NOT printed. The final println always runs.`
    },
    {
      q: `What does the boolean expression evaluate to?<pre>true || false &amp;&amp; !false &amp;&amp; (false || true)</pre>`,
      a: `<strong>true</strong><br>Operator precedence: <code>&amp;&amp;</code> binds tighter than <code>||</code>.<br>Evaluate right side first: <code>false &amp;&amp; !false &amp;&amp; (true)</code> = <code>false &amp;&amp; true &amp;&amp; true</code> = <code>false</code>.<br>Then: <code>true || false</code> = <strong>true</strong>.`
    },
    {
      q: `What does calling <code>pattern()</code> output?<pre>public static void pattern() {
  for (int i = 1; i &lt;= 3; i++)
    System.out.print("//"+i+""+(2*i)+""+(3*i)+"\\\\\\n");
}</pre>`,
      a: `<pre>//123\\
//246\\
//369\\</pre>Each iteration i=1,2,3 prints: <code>"//"</code> + i + (2×i) + (3×i) + <code>"\\"</code> then a newline.`
    },
    {
      q: `What is the value of <code>sum</code> if you call <code>calcSum(10, 9, 40)</code>?<pre>public static int calcSum(int start, int increment, int end){
  int sum = start, count = 0;
  while (sum &lt; end) {
    sum += increment;
    if (sum % 2 == 0) { sum += 1; count++; }
  }
  return sum;
}</pre>`,
      a: `<strong>49</strong><br>sum=10. Loop: sum=10+9=19(odd,skip)→28(even→29)→38(even→39)→48(even→49). Now 49≥40 so loop exits. Return <strong>49</strong>.`
    },
    {
      q: `Calling <code>drawGrid(20)</code> will result in a grid of circles containing how many rows and columns?<pre>public static void drawGrid(int x) {
  for (int i = 0; i &lt; x; i++)
    drawCircle(30+(i%6)*20, 30+(i/6)*20);
}</pre>`,
      a: `<strong>Three rows of six circles, and one more row of two circles</strong> (20 total).<br><code>i%6</code> cycles columns 0–5 (6 per row). <code>i/6</code> gives row number (integer division). For i=0..17: 3 complete rows of 6. For i=18,19: a 4th row with 2 circles.`
    }
  ],

  // === RECURSION ===
  [
    {
      q: `What is the difference between <b>linear</b> and <b>non-linear</b> recursion?`,
      a: `<strong>Linear recursion:</strong> the method makes exactly <strong>one</strong> recursive call per invocation (runs once before reaching the base case).<br><strong>Non-linear recursion:</strong> the method makes <strong>two or more</strong> recursive calls per invocation (e.g., Fibonacci). This creates a tree of calls.`
    },
    {
      q: `What value is returned by <code>fun2(16)</code>?<pre>public int fun2(int n) {
  if (n == 1) return 0;
  else return 1 + fun2(n/2);
}</pre>`,
      a: `<strong>4</strong><br>fun2(16)=1+fun2(8)=1+1+fun2(4)=1+1+1+fun2(2)=1+1+1+1+fun2(1)=1+1+1+1+0 = <strong>4</strong><br>This counts how many times you can divide 16 by 2 before reaching 1 (i.e., log₂16 = 4).`
    },
    {
      q: `What value is returned by <code>foo(3)</code>?<pre>public int foo(int n) {
  if (n &lt; 0) return 1;
  else return foo(n-2) + foo(n-1);
}</pre>`,
      a: `<strong>8</strong><br>foo(3) = foo(1)+foo(2)<br>foo(1) = foo(-1)+foo(0) = 1 + (foo(-2)+foo(-1)) = 1+1+1 = 3<br>foo(2) = foo(0)+foo(1) = (1+1+1)+3 = 2+3 = 5<br>foo(3) = 3+5 = <strong>8</strong>`
    },
    {
      q: `What do you get from the call <code>fun(13)</code>?<pre>public static int fun(int n) {
  if (n &gt; 100) return n - 10;
  else return fun(fun(n + 11));
}</pre>`,
      a: `<strong>91</strong><br>This is the classic McCarthy 91 function. For any n ≤ 100, it always returns 91. Trace: fun(13)→fun(fun(24))→fun(fun(fun(35)))→...eventually all inner calls reach n&gt;100, each returning n-10, and the chain resolves to <strong>91</strong>.`
    },
    {
      q: `What will the call <code>fun(13)</code> return?<pre>public static int fun(int i) {
  if (i % 2 == 0) return (i += 2);
  else return fun(fun(i - 1));
}</pre>`,
      a: `<strong>16</strong><br>fun(13): 13 is odd → fun(fun(12))<br>fun(12): 12 is even → 12+2 = 14<br>Now fun(14): 14 is even → 14+2 = <strong>16</strong>`
    },
    {
      q: `What is the returned value of <code>mystery(9, 4, 2)</code>?<pre>public static int mystery(int x, int y, int z) {
  if (x &gt; z)
    return x + (y%2) + mystery(x-z, y-1, z+1);
  else
    return x * y * z;
}</pre>`,
      a: `<strong>49</strong><br>Call 1: x=9>z=2 → 9+(4%2)+mystery(7,3,3) = 9+0+mystery(7,3,3)<br>Call 2: x=7>z=3 → 7+(3%2)+mystery(4,2,4) = 7+1+mystery(4,2,4)<br>Call 3: x=4, z=4 → x not > z → 4×2×4 = 32<br>Total: 9+0+(7+1+32) = 9+40 = <strong>49</strong>`
    }
  ],

  // === STRING & MATH CLASSES ===
  [
    {
      q: `What can replace <code>/* missing code */</code> so <code>almostEqual</code> works correctly?<pre>public static boolean almostEqual(
    double d1, double d2, double tolerance) {
  /* missing code */;
}
// almostEqual(7.9, 7.8, 0.15) → true
// almostEqual(54.124, 54.126, 0.001) → false</pre>`,
      a: `<code>return Math.abs(d1 - d2) &lt;= tolerance;</code><br><code>Math.abs()</code> gives the absolute distance between d1 and d2. If that distance is within tolerance, return true.`
    },
    {
      q: `This code removes the first "a" from <code>word</code>. Under what condition does it produce a <b>runtime error</b>?<pre>int aLoc = word.indexOf("a");
String newWord = word.substring(0, aLoc)
               + word.substring(aLoc + 1);</pre>`,
      a: `<strong>When <code>word</code> does not contain the character "a".</strong><br><code>indexOf("a")</code> returns <code>-1</code> when "a" is not found. Then <code>substring(0, -1)</code> throws a <code>StringIndexOutOfBoundsException</code>.`
    },
    {
      q: `What can replace <code>/*code*/</code> to assign a random integer between <code>min</code> and <code>max</code> inclusive?<pre>double rn = Math.random();
int num = /*code*/;</pre>`,
      a: `<code>(int)(rn * (max - min + 1)) + min</code><br><code>Math.random()</code> gives [0.0,1.0). Multiplying by <code>(max-min+1)</code> gives [0, range). Casting to int gives 0 to range-1. Adding <code>min</code> shifts to [min, max].`
    },
    {
      q: `What can replace <code>/*code*/</code> so this outputs <code>"pun"</code>?<pre>String one = "computer";
String two = "science";
String concat = /*code*/;
System.out.println(concat);</pre>`,
      a: `<code>one.substring(3, 5) + two.substring(4, 5)</code><br>"computer".substring(3,5) = "pu" (indices 3,4)<br>"science".substring(4,5) = "n" (index 4)<br>Result: "pu" + "n" = <strong>"pun"</strong>`
    },
    {
      q: `What is the best approximate value of <code>answer</code>?<pre>double randNum = Math.random();
double answer = (int)(Math.pow((int)randNum*10, 2))
              - Math.sqrt(Math.pow(randNum, 2));</pre>`,
      a: `<strong>The negative of the value stored in <code>randNum</code></strong>.<br><code>Math.random()</code> returns [0.0,1.0), so <code>(int)randNum = 0</code>.<br>Thus <code>(int)(Math.pow(0,2)) = 0</code>.<br><code>Math.sqrt(Math.pow(randNum,2)) = Math.sqrt(randNum²) = randNum</code>.<br>So <code>answer = 0 - randNum = -randNum</code>.`
    },
    {
      q: `<code>Math.random()</code> returns a value in [0.0, 1.0). Write an expression using <code>Math.random()</code> and <code>Math.pow()</code> to generate a random integer from <b>1 to 100</b> inclusive, then explain what <code>Math.pow(2,10)</code> returns and its type.`,
      a: `Random 1–100: <code>(int)(Math.random() * 100) + 1</code><br><code>Math.pow(2, 10)</code> returns <strong>1024.0</strong> — it always returns a <code>double</code>, even if the result is a whole number. To get an <code>int</code> you'd cast: <code>(int)Math.pow(2, 10)</code>.`
    }
  ]
];

const POINT_VALUES = [100, 200, 300, 400, 500, 600];

// State
let scores = [0, 0, 0];
let used = Array.from({length: 6}, () => Array(6).fill(false));
let currentCell = null; // {cat, row}
let selectedTeam = 0;

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = TEAMS.map((name, i) => `
    <div class="team-score ${i === selectedTeam ? 'active' : ''}" onclick="selectTeam(${i})">
      <div class="team-name">${name}</div>
      <div class="score-value">$${scores[i]}</div>
      ${i === selectedTeam ? '<div class="active-label">● Active</div>' : ''}
    </div>
  `).join('');
}

function selectTeam(i) {
  selectedTeam = i;
  renderScoreboard();
  // Update team buttons in modal if open
  document.querySelectorAll('.team-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === selectedTeam);
  });
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Category headers
  CATEGORIES.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'cat-header';
    div.textContent = cat;
    board.appendChild(div);
  });

  // Cells: row 0 = 100pts, row 5 = 600pts
  for (let row = 0; row < 6; row++) {
    for (let cat = 0; cat < 6; cat++) {
      const div = document.createElement('div');
      div.className = 'cell' + (used[cat][row] ? ' used' : '');
      div.innerHTML = `<span class="points">$${POINT_VALUES[row]}</span>`;
      if (!used[cat][row]) {
        div.addEventListener('click', () => openQuestion(cat, row));
      }
      board.appendChild(div);
    }
  }
}

function openQuestion(cat, row) {
  currentCell = {cat, row};
  const q = QUESTIONS[cat][row];

  document.getElementById('modalCat').textContent = CATEGORIES[cat];
  document.getElementById('modalPts').textContent = `$${POINT_VALUES[row]}`;
  document.getElementById('modalQ').innerHTML = q.q;
  document.getElementById('modalA').innerHTML = q.a;
  document.getElementById('modalA').classList.remove('show');

  // Team buttons
  const tb = document.getElementById('teamBtns');
  tb.innerHTML = TEAMS.map((name, i) => `
    <button class="team-btn ${i === selectedTeam ? 'selected' : ''}" onclick="selectTeamModal(${i})">${name}</button>
  `).join('');

  document.getElementById('overlay').classList.add('show');
}

function selectTeamModal(i) {
  selectedTeam = i;
  document.querySelectorAll('.team-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === i);
  });
  renderScoreboard();
}

document.getElementById('revealBtn').addEventListener('click', () => {
  document.getElementById('modalA').classList.add('show');
});

document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('btnSkip').addEventListener('click', closeModal);

document.getElementById('btnCorrect').addEventListener('click', () => {
  if (currentCell === null) return;
  scores[selectedTeam] += POINT_VALUES[currentCell.row];
  markUsed();
});

document.getElementById('btnWrong').addEventListener('click', () => {
  if (currentCell === null) return;
  scores[selectedTeam] -= POINT_VALUES[currentCell.row];
  markUsed();
});

function markUsed() {
  used[currentCell.cat][currentCell.row] = true;
  closeModal();
  renderScoreboard();
  renderBoard();
  checkWinner();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  currentCell = null;
}

function checkWinner() {
  const allUsed = used.every(cat => cat.every(v => v));
  if (!allUsed) return;
  const maxScore = Math.max(...scores);
  const winnerIdx = scores.indexOf(maxScore);
  document.getElementById('winnerName').textContent = TEAMS[winnerIdx] + ' Wins!';
  document.getElementById('winnerScore').textContent = `Final Score: $${maxScore}`;
  document.getElementById('winnerOverlay').classList.add('show');
}

function resetGame() {
  scores = [0, 0, 0];
  used = Array.from({length: 6}, () => Array(6).fill(false));
  selectedTeam = 0;
  document.getElementById('winnerOverlay').classList.remove('show');
  // Reset inputs and show setup screen again
  document.getElementById('tname0').value = '';
  document.getElementById('tname1').value = '';
  document.getElementById('tname2').value = '';
  document.getElementById('setupScreen').style.display = 'flex';
  setTimeout(() => document.getElementById('tname0').focus(), 100);
}

// Close modal on overlay click
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

function startGame() {
  const inputs = [
    document.getElementById('tname0').value.trim(),
    document.getElementById('tname1').value.trim(),
    document.getElementById('tname2').value.trim(),
  ];
  TEAMS[0] = inputs[0] || 'Team 1';
  TEAMS[1] = inputs[1] || 'Team 2';
  TEAMS[2] = inputs[2] || 'Team 3';
  document.getElementById('setupScreen').style.display = 'none';
  renderScoreboard();
  renderBoard();
}

// Focus first input on load, allow Enter to advance
document.getElementById('tname0').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('tname1').focus(); });
document.getElementById('tname1').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('tname2').focus(); });
document.getElementById('tname2').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });
document.getElementById('tname0').focus();


</script>
